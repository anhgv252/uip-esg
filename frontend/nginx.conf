server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS resolver — forces re-resolution every 5s so upstream
    # container IPs are refreshed after a restart (prevents stale DNS / 502).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Long cache for hashed assets; no cache for index.html (SPA entry)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — forward backend requests to avoid CORS in E2E/demo

    # Analytics API: forward to Kong (JWT + rate limiting + tenant injection)
    location /api/v1/analytics/ {
        set $upstream_kong http://kong:8000;
        proxy_pass $upstream_kong;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # All other API calls: forward to backend monolith (existing path, UNCHANGED)
    location /api/ {
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # SPA catch-all: always serve index.html for unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

