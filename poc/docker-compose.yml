version: "3.8"

# ─────────────────────────────────────────────────────────────────
#  UIP – ESG Telemetry Analytics  •  POC Stack
#
#  Services:
#   kafka             – Apache Kafka 3.7 (KRaft, no Zookeeper)
#   kafka-ui          – Provectus Kafka UI (web console)
#   kafka-topic-init  – One-shot topic creator
#   redpanda-connect  – Redpanda Connect / Benthos (ETL pipeline)
#   flink-jobmanager  – Flink cluster manager
#   flink-taskmanager – Flink worker node
#   flink-job         – One-shot job submitter
#   timescaledb       – Single DB: schema esg (metrics) + error_mgmt (errors)
#   esg-api           – ESG Service API (FastAPI)
#   producer          – 100K message load generator
# ─────────────────────────────────────────────────────────────────

networks:
  esg-net:
    driver: bridge

volumes:
  kafka-data:
  timescaledb-data:

# ──────────────────────────────────────────────────
services:

  # ── 1. Apache Kafka 3.7 (KRaft – no Zookeeper) ──
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks: [esg-net]
    ports:
      - "9092:9092"   # PLAINTEXT (inter-container)
      - "29092:29092" # EXTERNAL  (host access)
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_NUM_PARTITIONS=4
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── 2. Kafka UI (Provectus) ──────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [esg-net]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: esg-poc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ── 3. Topic Creator (init job) ─────────────────
  kafka-topic-init:
    image: apache/kafka:3.7.0
    container_name: kafka-topic-init
    networks: [esg-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic raw_telemetry --partitions 4 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ngsi_ld_telemetry --partitions 4 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic esg_clean_stream --partitions 4 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic esg_error_stream --partitions 4 --replication-factor 1 &&
        echo 'All Kafka topics created.' &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  # ── 4. Redpanda Connect (ETL normalisation) ──────
  #  Redpanda Connect = Benthos ETL engine.
  #  Hoàn toàn broker-agnostic, kết nối Kafka qua kafka:9092.
  redpanda-connect:
    image: ghcr.io/redpanda-data/connect:latest
    container_name: redpanda-connect
    networks: [esg-net]
    ports:
      - "4195:4195"
    volumes:
      - ./redpanda-connect/esg-normalize.yaml:/etc/connect/esg-normalize.yaml:ro
    command: run /etc/connect/esg-normalize.yaml
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── 5. TimescaleDB (clean metrics + aggregates) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    networks: [esg-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: esg_db
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_pass
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      # Single init file creates both schemas: esg + error_mgmt
      - ./init-db/timescaledb.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 6. Flink JobManager ─────────────────────────
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    networks: [esg-net]
    ports:
      - "8081:8081"
    environment:
      - FLINK_ROLE=jobmanager
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TIMESCALE_JDBC_URL=jdbc:postgresql://timescaledb:5432/esg_db
      - TIMESCALE_USER=esg_user
      - TIMESCALE_PASS=esg_pass
    command: jobmanager
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 8. Flink TaskManager ────────────────────────
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    networks: [esg-net]
    environment:
      - FLINK_ROLE=taskmanager
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TIMESCALE_JDBC_URL=jdbc:postgresql://timescaledb:5432/esg_db
      - TIMESCALE_USER=esg_user
      - TIMESCALE_PASS=esg_pass
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # ── 9. Flink Job Submitter ──────────────────────
  flink-job:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-job
    networks: [esg-net]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TIMESCALE_JDBC_URL=jdbc:postgresql://timescaledb:5432/esg_db
      - TIMESCALE_USER=esg_user
      - TIMESCALE_PASS=esg_pass
    command: >
      bash -c "
        echo '⏳ Waiting for Flink cluster…' &&
        until curl -sf http://flink-jobmanager:8081/overview; do sleep 5; done &&
        echo '🚀 Submitting ESG Processing Job…' &&
        flink run -m flink-jobmanager:8081 -py /opt/flink/jobs/esg_processing.py &&
        echo '✅ Job submitted successfully.'
      "
    depends_on:
      flink-taskmanager:
        condition: service_started
      kafka-topic-init:
        condition: service_completed_successfully
    restart: "no"

  # ── 10. ESG Service API ─────────────────────────
  esg-api:
    build:
      context: ./esg-api
      dockerfile: Dockerfile
    container_name: esg-api
    networks: [esg-net]
    ports:
      - "8000:8000"
    environment:
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 11. Message Producer ─────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    networks: [esg-net]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOTAL_MESSAGES=100000
      - VALID_RATIO=0.70
      - BATCH_SIZE=500
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
      esg-api:
        condition: service_healthy
    restart: "no"
