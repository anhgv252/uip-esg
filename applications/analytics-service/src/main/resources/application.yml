server:
  port: 8081
  tomcat:
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: uip-analytics-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ClickHouse connection — required for Tier 2
clickhouse:
  url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123}
  username: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}
  database: ${CLICKHOUSE_DB:analytics}

# JWT secret — must match monolith's secret
uip:
  security:
    jwt-secret: ${JWT_SECRET:changeme_jwt_secret_min_32_characters_long}
    keycloak-public-key: ${UIP_SECURITY_KEYCLOAK_PUBLIC_KEY:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Springdoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
