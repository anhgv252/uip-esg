groups:
  - name: kong_alerts
    rules:
      - alert: KongDown
        expr: up{job="kong"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kong API Gateway is down"
          description: "Kong instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: KongHighErrorRate
        expr: rate(kong_http_requests_total{code=~"5.."}[5m]) / rate(kong_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kong error rate above 5%"
          description: "Kong 5xx error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}."

      - alert: KongHighLatency
        expr: histogram_quantile(0.95, rate(kong_latency_bucket{type="request"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kong request latency p95 above 1s"
          description: "Kong p95 latency is {{ $value }}s on {{ $labels.instance }}."
