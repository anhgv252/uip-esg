groups:
  - name: sprint6-flood-alert-alerts
    interval: 30s
    rules:
      - alert: FloodAlertProcessingLatencyHigh
        expr: histogram_quantile(0.99, rate(flood_alert_processing_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
          team: backend
          sprint: "6"
        annotations:
          summary: "Flood alert p99 latency > 30s"
          description: "Flood alert pipeline p99 latency is {{ $value }}s. Target <30s for real-time flood warning."
          runbook: "docs/mvp3/reports/sprint6-test-plan.md#gate-g7"

      - alert: FloodKafkaConsumerLag
        expr: kafka_consumer_group_lag{group="flood-alert-consumer"} > 1000
        for: 3m
        labels:
          severity: warning
          team: backend
          sprint: "6"
        annotations:
          summary: "Flood alert Kafka consumer lag > 1000"
          description: "Consumer group flood-alert-consumer lag is {{ $value }}. May delay flood alert delivery."
          runbook: "docs/mvp3/reports/sprint6-test-plan.md#gate-g3"

      - alert: FlinkFloodAlertJobDown
        expr: flink_jobmanager_job_numRunningJobs{job_name="FloodAlertJob"} < 1
        for: 2m
        labels:
          severity: critical
          team: backend
          sprint: "6"
        annotations:
          summary: "Flink FloodAlertJob is NOT running"
          description: "Flink FloodAlertJob has 0 running instances. Flood alert detection is offline."
          runbook: "docs/mvp3/reports/sprint6-test-plan.md#gate-g3"

  - name: sprint6-ai-workflow-alerts
    interval: 30s
    rules:
      - alert: AIDecisionTimeoutRateHigh
        expr: |
          sum(rate(ai_decision_timeout_total[5m]))
          / sum(rate(ai_decision_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          team: backend
          sprint: "6"
        annotations:
          summary: "AI Decision timeout rate > 5%"
          description: "AI Decision Gateway timeout rate is {{ $value | humanizePercentage }}. Claude API may be degraded."
          runbook: "docs/mvp3/reports/sprint6-test-plan.md#gate-g2"

      - alert: AIWorkflowExecutionFailureRate
        expr: |
          sum(rate(ai_workflow_executions_total{status="FAILED"}[10m]))
          / sum(rate(ai_workflow_executions_total[10m])) > 0.1
        for: 5m
        labels:
          severity: warning
          team: backend
          sprint: "6"
        annotations:
          summary: "AI Workflow execution failure rate > 10%"
          description: "Workflow execution failure rate is {{ $value | humanizePercentage }}. Check Camunda logs."
