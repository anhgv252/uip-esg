global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

rule_files:
  - "alert-rules.yml"
  - "alerts/*.yml"
  - "alert-rules-sprint11.yml"
  - "alert-rules-ch-keeper.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: 'uip-backend'
    metrics_path: '/actuator/prometheus'
    basic_auth:
      username: prometheus
      password: prometheus-dev-scrape
    static_configs:
      - targets: ['uip-backend:8081']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'analytics-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['analytics-service:8081']  # service name DNS (supports --scale; was uip-analytics-service after container_name removal)

  - job_name: 'kong'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['uip-kong:8001']

  - job_name: 'forecast-service'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['uip-forecast-service:8090']

  # Sprint 6 — Flink JobManager + TaskManager metrics
  - job_name: 'flink-jobmanager'
    metrics_path: '/'
    scrape_interval: 15s
    static_configs:
      - targets: ['flink-jobmanager:9250']
        labels:
          flink: 'jobmanager'

  - job_name: 'flink-taskmanager'
    metrics_path: '/'
    scrape_interval: 15s
    static_configs:
      - targets: ['flink-taskmanager:9250']
        labels:
          flink: 'taskmanager'

  # Sprint 6 — EMQX MQTT broker metrics
  - job_name: 'emqx'
    metrics_path: '/api/v5/prometheus/stats'
    scrape_interval: 15s
    static_configs:
      - targets: ['emqx:18083']

  # Sprint 11 — ClickHouse OLAP metrics (via clickhouse-exporter sidecar)
  # Exporter added to docker-compose.monitoring.yml; connects to uip-clickhouse:8123
  - job_name: 'clickhouse'
    scrape_interval: 30s
    static_configs:
      - targets: ['clickhouse-exporter:9116']

  # S11-INFRA-01 — ClickHouse Keeper metrics (native Prometheus endpoint)
  # Keeper exposes metrics at :9363/metrics for memory, goroutines, snapshots, gRPC
  - job_name: 'clickhouse-keeper'
    scrape_interval: 30s
    static_configs:
      - targets: ['uip-clickhouse-keeper:9363']
        labels:
          component: 'keeper'
