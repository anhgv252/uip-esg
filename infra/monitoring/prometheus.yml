global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

rule_files:
  - "alert-rules.yml"
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: 'uip-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['uip-backend:8081']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'analytics-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['uip-analytics-service:8081']

  - job_name: 'kong'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['uip-kong:8001']

  - job_name: 'forecast-service'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['uip-forecast-service:8090']
