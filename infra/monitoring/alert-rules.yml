groups:
  - name: uip-backend-alerts
    interval: 30s
    rules:
      - alert: HighP95Latency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job="uip-backend"}[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 latency > 200ms on {{ $labels.instance }}"
          description: "P95 latency is {{ $value | humanizeDuration }}. Check DB queries and Redis cache."
          runbook: "docs/mvp2/deployment/oncall-playbook.md#alert-1-highp95latency"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag{group=~"uip-.*"} > 1000
        for: 3m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Kafka consumer lag > 1000 for group {{ $labels.group }}"
          description: "Consumer group {{ $labels.group }} lag is {{ $value }}."
          runbook: "docs/mvp2/deployment/oncall-playbook.md#alert-2-kafkaconsumerlag"

      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Circuit breaker OPEN: {{ $labels.name }}"
          description: "Claude API circuit breaker is OPEN. Fallback mode active."
          runbook: "docs/mvp2/deployment/oncall-playbook.md#alert-3-circuitbreakeropen"

      - alert: PostgresConnectionPoolExhausted
        expr: hikaricp_connections_pending{pool="HikariPool-1"} > 5
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "HikariCP connection pool exhausted ({{ $value }} pending)"
          description: "Pool may be exhausted. Check active connections and slow queries."

      - alert: SensorIngestRateDrop
        expr: rate(sensor_readings_total[5m]) < 10
        for: 5m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Sensor ingest rate drop on {{ $labels.instance }}"
          description: "Sensor ingest rate is {{ $value }} req/s — expected >10/s."
          runbook: "docs/mvp2/deployment/oncall-playbook.md#alert-4-sensoringestratedrop"

      - alert: BackupFailed
        expr: time() - pgbackrest_backup_timestamp_last_completed > 86400 * 1.5
        for: 0m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "PostgreSQL backup overdue (>36h since last success)"
          description: "Check pgBackRest logs and infra/backup/ configuration."
