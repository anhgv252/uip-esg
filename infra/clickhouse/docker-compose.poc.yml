version: '3.8'

# ClickHouse POC — Single-node, Sprint MVP3-1
# Production cần HA (Sprint 2: v3-DevOps-03)

services:
  clickhouse-poc:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: uip-clickhouse-poc
    hostname: clickhouse-poc
    ports:
      - "8123:8123"   # HTTP interface (REST queries, health check)
      - "9000:9000"   # Native TCP (JDBC driver)
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: uip_analytics
      CLICKHOUSE_PASSWORD: uip_analytics_pwd
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_poc_data:/var/lib/clickhouse
      - ./schema:/docker-entrypoint-initdb.d:ro
      - ./config/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - uip-poc-network

volumes:
  clickhouse_poc_data:
    driver: local

networks:
  uip-poc-network:
    driver: bridge
