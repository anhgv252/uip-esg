apiVersion: v1
kind: Service
metadata:
  name: {{ include "uip-backend.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: uip-backend
    slot: {{ .Values.slot }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080

---
# Active service for blue-green traffic switching
apiVersion: v1
kind: Service
metadata:
  name: uip-backend-active
spec:
  type: ClusterIP
  selector:
    app: uip-backend
    slot: {{ .Values.slot }}
  ports:
    - port: 8080
      targetPort: 8080
