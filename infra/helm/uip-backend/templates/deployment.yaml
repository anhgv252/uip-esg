apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uip-backend.fullname" . }}
  labels:
    app: uip-backend
    slot: {{ .Values.slot }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: uip-backend
      slot: {{ .Values.slot }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: uip-backend
        slot: {{ .Values.slot }}
    spec:
      containers:
        - name: uip-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: uip-backend-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uip-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uip-db-secret
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              value: {{ .Values.redis.host }}
            - name: SPRING_DATA_REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: uip-jwt-keys
                  key: secret
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
