# T1 customer — single-tenant deployment, no RLS overhead
replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: 2000m
    memory: 1536Mi
postgresql:
  pvcSize: "20Gi"
extraEnv:
  - name: UIP_CAPABILITIES_MULTI_TENANCY
    value: "false"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod,t1"
