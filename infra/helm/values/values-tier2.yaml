# T2 customer — Building Cluster (5-20 tòa), multi-tenant, extracted services.
# Deploy: helm upgrade --install uip-stack ./infra/helm -f values-tier2.yaml
#
# Khác biệt vs Tier 1:
#   - 3 images thay 1 (cùng version tag — bắt buộc per ADR-011)
#   - monolith HPA min 3, analytics-service + iot-service scale độc lập
#   - analytics-service và iot-ingestion-service được enable

# ── Monolith ─────────────────────────────────────────────────────────────────
replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
resources:
  requests:
    cpu: 1000m
    memory: 1536Mi
  limits:
    cpu: 3000m
    memory: 3072Mi

extraEnv:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod,t2"
  - name: ANALYTICS_SERVICE_URL
    value: "http://uip-analytics-service/api/v1/analytics"

postgresql:
  pvcSize: "100Gi"

# ── analytics-service (ClickHouse owner) ────────────────────────────────────
analyticsService:
  enabled: true              # T1: false (không deploy)
  image:
    repository: uip-analytics-service
    tag: ""                  # được set bởi CI: cùng tag với monolith
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2048Mi
  env:
    - name: CLICKHOUSE_HOST
      value: "clickhouse"
    - name: CLICKHOUSE_PORT
      value: "8123"

# ── iot-ingestion-service (BMS + MQTT owner) ─────────────────────────────────
iotIngestionService:
  enabled: true              # T1: false (không deploy)
  image:
    repository: uip-iot-service
    tag: ""                  # được set bởi CI: cùng tag với monolith
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60   # IoT ingestion CPU-sensitive
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1024Mi
  env:
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: "kafka:9092"
    - name: EMQX_HOST
      value: "emqx"

# ── ClickHouse ────────────────────────────────────────────────────────────────
clickhouse:
  enabled: true              # T1: false
  replicaCount: 2
  pvcSize: "200Gi"

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka:
  replicaCount: 3
  partitions: 12             # T1: 4-8 partitions

# ── TimescaleDB ───────────────────────────────────────────────────────────────
timescaledb:
  pvcSize: "100Gi"
  patroni:
    enabled: true            # T1: false (single node đủ)
    replicas: 2              # 1 primary + 1 standby
