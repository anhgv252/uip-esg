_format_version: "3.0"
_transform: true

# Kong DB-less declarative config — UIP Platform non-prod
# Sprint MVP4-S2 | ADR-028: Kong Gateway Scope — Extracted Services Only
# v3.1-15: Migrated from static RSA public key to JWKS endpoint
#
# Kong scope = extracted services only (analytics-service, iot-ingestion-service)
# Monolith vẫn qua nginx Ingress trực tiếp (ADR-028 constraint)
#
# JWKS migration benefits:
#   - Token rotation without Kong restart (Keycloak rotates keys → Kong auto-fetches)
#   - No need to embed RSA public key in declarative config
#   - Kong re-fetches JWKS every 300s (config.uris_timeout default)
#
# Plugin order (BẤT BIẾN — BR-007):
#   1. cors → 2. jwt → 3. request-transformer → 4. rate-limiting → 5. prometheus → 6. correlation-id

services:
  # ─── analytics-service (Tier 2 extracted) ───────────────────────────────────
  - name: analytics-service
    url: http://analytics-service:8081
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    retries: 0
    routes:
      - name: analytics-cross-building
        paths:
          - /api/v1/analytics
        strip_path: false
        methods:
          - GET
          - POST
    plugins:
      - name: cors
        config:
          origins:
            - "https://uip.local"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Tenant-ID
          max_age: 3600
          credentials: true

      - name: jwt
        config:
          uri: "http://keycloak:8085/realms/uip/protocol/openid-connect/certs"
          # JWKS public keys fetched from Keycloak at: http://keycloak:8085/realms/uip/protocol/openid-connect/certs
          # JWKS endpoint — Kong fetches signing keys from Keycloak automatically.
          # Key rotation: when Keycloak rotates RS256 keys, Kong re-fetches within
          # config.cache_ttl (default 300s) — no Kong restart required.
          claims_to_verify:
            - exp
            - nbf
          key_claim_name: iss
          secret_is_base64: false
          # alg=none rejected: Kong jwt plugin requires valid signature
          # Token với alg=none không có signature → verification fails → 401

      - name: request-transformer
        config:
          remove:
            headers:
              # Strip client-supplied X-Tenant-ID (BR-008: prevent header spoofing)
              # Tenant validation is enforced inside analytics-service via JWT claim
              - X-Tenant-ID
              - X-Is-Aggregator

      - name: rate-limiting
        config:
          minute: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false

      - name: prometheus
        config:
          status_code_metrics: true
          latency_metrics: true
          upstream_health_metrics: true

      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid#counter
          echo_downstream: true

  # ─── iot-ingestion-service (Tier 2, Shadow mode Sprint 4) ───────────────────
  # Placeholder — sẽ được enable Sprint 4 khi v3-EXT-06 hoàn thành
  # - name: iot-ingestion-service
  #   url: http://iot-ingestion-service:8083

# ─── Consumers (Keycloak JWT issuer consumers) ────────────────────────────────
consumers:
  - username: keycloak-uip-realm
    custom_id: keycloak-uip-realm

jwt_secrets:
  - consumer: keycloak-uip-realm
    key: "http://localhost:8085/realms/uip"
    # No static rsa_public_key needed — Kong fetches from JWKS endpoint (config.uri above).
    # The 'key' field still required as consumer identifier (must match JWT iss claim).
    algorithm: RS256

# ─── Global plugins (apply to all services) ──────────────────────────────────
plugins:
  - name: prometheus
    config:
      status_code_metrics: true
