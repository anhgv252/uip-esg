# Docker socket — standard path (Docker Desktop creates /var/run/docker.sock symlink on macOS)
docker.host=unix:///var/run/docker.sock

# Ryuk PHẢI được bật để dọn sạch test containers sau khi JVM thoát.
# Ghi đè global ~/.testcontainers.properties (có thể chứa ryuk.disabled=true).
ryuk.disabled=false
