spring.application.name=uip-backend-test

# Disable Redis for tests
spring.data.redis.enabled=false
spring.cache.type=none

# Disable Kafka for tests
spring.kafka.enabled=false

# Disable ClickHouse for tests
# (No Spring Boot auto-config, but keep for reference)

# Disable TimescaleDB connection pool for tests
spring.datasource.hikari.maximum-pool-size=1

# Test JWT settings
jwt.issuer=https://test-issuer
jwt.audience=test-audience

# Claude API stub
claude.api.key=test-key
claude.api.model=claude-3-5-sonnet-20241022
claude.api.timeout-seconds=30
claude.api.max-tokens=1024
