# Staging profile — overrides dev defaults.
# Activate: SPRING_PROFILES_ACTIVE=staging
# Kafka SASL_SSL enforced; anonymous connections rejected.

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9094}
    security:
      protocol: SASL_SSL
    properties:
      sasl.mechanism: PLAIN
      sasl.jaas.config: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USERNAME}\" password=\"${KAFKA_PASSWORD}\";"
      ssl.truststore.location: /etc/ssl/certs/kafka-ca.jks
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}

# Staging DB — expects separate RDS/Cloud SQL instance
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

# Staging Redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

uip:
  capabilities:
    multi-tenancy: true
    redis-cache: true
    kong-gateway: true

management:
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    root: WARN
    com.uip: INFO
