server:
  tomcat:
    threads:
      max: 400
      min-spare: 20
    max-connections: 8000
    accept-count: 200
    connection-timeout: 10s

spring:
  application:
    name: uip-backend
  autoconfigure:
    exclude:
      - org.camunda.bpm.spring.boot.starter.webapp.CamundaBpmWebappSecurityAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/uip_smartcity
    username: uip
    password: ${DB_PASSWORD:changeme_db_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 80
      minimum-idle: 20
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 120000
      validation-timeout: 2500
      leak-detection-threshold: 60000
      pool-name: UIP-HikariPool

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:changeme_redis_password}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 40
          max-idle: 20
          min-idle: 5

  cache:
    type: redis
    redis:
      time-to-live: 60000   # 60s TTL for trigger-config cache
      cache-null-values: false

  kafka:
    bootstrap-servers: localhost:29092
    security:
      protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    properties:
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: uip-backend
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.uip.*, java.util"
        spring.json.value.default.type: "java.util.LinkedHashMap"
        spring.json.use.type.headers: false

security:
  login:
    rate-limit:
      capacity: 100
  jwt:
    secret: ${JWT_SECRET:changeme_jwt_secret_must_be_at_least_256_bits_long_for_hmac_sha256}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    hmac-issuer: ${JWT_HMAC_ISSUER:uip-legacy}
    keycloak-issuer: ${JWT_KEYCLOAK_ISSUER:http://localhost:8085/realms/uip}
    keycloak-jwk-set-uri: ${JWT_KEYCLOAK_JWK_SET_URI:http://localhost:8085/realms/uip/protocol/openid-connect/certs}

camunda:
  bpm:
    admin-user:
      id: ${CAMUNDA_ADMIN_USER:admin}
      password: ${CAMUNDA_ADMIN_PASSWORD:admin_Dev#2026!}
      first-name: Admin
    filter:
      create: All Tasks
    database:
      schema-update: true
    job-execution:
      enabled: true
    history-level: audit
    auto-deployment-enabled: true
    deployment-resource-pattern: "classpath*:processes/*.bpmn"
    generic-properties:
      properties:
        historyTimeToLive: 30
        enforceHistoryTimeToLive: false
    task:
      execution:
        pool:
          core-size: 5
          max-size: 20
          queue-capacity: 100

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    url: https://api.anthropic.com/v1/messages
    timeout-seconds: 10

app:
  invite:
    base-url: ${INVITE_BASE_URL:http://localhost:3000}

bms:
  mqtt:
    broker-url: ${EMQX_BROKER_URL:tcp://localhost:1883}
    client-id: ${EMQX_CLIENT_ID:uip-bms-backend}
    username: ${EMQX_USERNAME:}
    password: ${EMQX_PASSWORD:}
    command-topic-pattern: bms/commands/%s/%s
    qos: 1
  discovery:
    enabled: ${BMS_DISCOVERY_ENABLED:false}
    broadcast: ${BMS_DISCOVERY_BROADCAST:255.255.255.255}
    local-device-id: ${BMS_DISCOVERY_LOCAL_DEVICE_ID:100}
    tenant-id: ${BMS_DISCOVERY_TENANT_ID:default}
    interval-ms: ${BMS_DISCOVERY_INTERVAL_MS:300000}
    initial-delay-ms: ${BMS_DISCOVERY_INITIAL_DELAY_MS:60000}

resilience4j:
  circuitbreaker:
    instances:
      claude-api:
        sliding-window-size: 10
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
      kafka-producer:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
        record-exceptions:
          - org.springframework.kafka.KafkaException
          - java.io.IOException
      redis-cache:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - java.io.IOException
      bms-adapter:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - com.uip.backend.bms.adapter.BmsAdapterException
          - java.io.IOException
          - java.net.SocketTimeoutException

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; override to 0.1 in staging/prod

springdoc:
  swagger-ui:
    operationsSorter: method

uip:
  management:
    prometheus:
      password: ${PROMETHEUS_SCRAPE_PASSWORD:prometheus-dev-scrape}
  rate-limit:
    default:
      requests-per-minute: 100000
  cagg:
    sensor-refresh-ms: 30000
    alert-refresh-ms: 15000
  capabilities:
    multi-tenancy: true
    redis-cache: true
    clickhouse: false
    kong-gateway: false
    keycloak: false
    edge-computing: false
    multi-region: false
    iot-ingestion-external: false
    alert-external: false
    analytics-external: false
    analytics-transport: ${UIP_CAPABILITIES_ANALYTICS_TRANSPORT:rest}
    forecast-engine: ${UIP_FORECAST_ENGINE:python}
  forecast:
    service-url: ${UIP_FORECAST_SERVICE_URL:http://uip-forecast-service:8090}
  push:
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:admin@uip.vn}
    fcm:
      enabled: false
      service-account-key: ${FCM_SERVICE_ACCOUNT_KEY:}
    apns:
      enabled: false
      certificate-path: ${APNS_CERTIFICATE_PATH:}
      certificate-password: ${APNS_CERTIFICATE_PASSWORD:}
      topic: ${APNS_TOPIC:com.uip.operator}
      production: ${APNS_PRODUCTION:false}

apicurio:
  registry:
    url: ${APICURIO_REGISTRY_URL:http://localhost:8087/apis/registry/v2}
    auto-register: true
    compatibility: BACKWARD

logging:
  level:
    com.uip: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# gRPC client — ADR-012 (only active when analytics-transport=grpc)
grpc:
  client:
    analytics-service:
      address: ${GRPC_ANALYTICS_ADDRESS:static://localhost:9090}
      negotiationType: plaintext

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:timescaledb}:5432/${POSTGRES_DB:uip_smartcity}
    username: ${POSTGRES_USER:uip}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      password: ${REDIS_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

---
spring:
  config:
    activate:
      on-profile: test
  cache:
    type: simple
  datasource:
    hikari:
      maximum-pool-size: 5
  data:
    redis:
      password: ""
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
