# Horizontal Pod Autoscaler — analytics-service
# S4-04: min 2 / max 6, CPU 70%
#
# NOTE: For Docker Compose (non-K8s), scaling is done via:
#   docker compose up -d --scale analytics-service=2
# This file is for Kubernetes deployment (production).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: uip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
