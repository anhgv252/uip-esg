# ClickHouse HA + Kafka 3-broker Overlay — ADR-036 + ADR-037
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ha.yml up -d
#
# This overlay adds:
#   1. ClickHouse Keeper + 2 nodes (ReplicatedReplacingMergeTree) — ADR-036
#   2. Kafka 3-broker KRaft quorum — ADR-037
#
# BACKWARD COMPAT: Tier 1 dev continues using docker-compose.yml only (single-node).
#
# Migration:
#   make ch-migrate      — ClickHouse data migration
#   make kafka-rebalance — Kafka partition rebalancing

services:
  # ─── ClickHouse Keeper (coordination, replaces ZooKeeper) ──────────────────
  # 3-node quorum for HA — ADR-036 S9-TD-KEEPER
  # Quorum survives 1 keeper failure (majority = 2/3 nodes)
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:23.8-alpine
    container_name: uip-clickhouse-keeper
    restart: unless-stopped
    volumes:
      - clickhouse-keeper-data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper-config-01.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    ports:
      - "9181:9181"  # Keeper client port
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - uip-network

  clickhouse-keeper-02:
    image: clickhouse/clickhouse-keeper:23.8-alpine
    container_name: uip-clickhouse-keeper-02
    restart: unless-stopped
    volumes:
      - clickhouse-keeper-02-data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper-config-02.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    ports:
      - "9182:9181"  # Keeper client port (offset)
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - uip-network

  clickhouse-keeper-03:
    image: clickhouse/clickhouse-keeper:23.8-alpine
    container_name: uip-clickhouse-keeper-03
    restart: unless-stopped
    volumes:
      - clickhouse-keeper-03-data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper-config-03.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    ports:
      - "9183:9181"  # Keeper client port (offset)
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - uip-network

  # ─── ClickHouse Node 1 (primary) ──────────────────────────────────────────
  clickhouse-01:
    image: clickhouse/clickhouse-server:23.8
    container_name: uip-clickhouse-01
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_REPLICA_NAME: replica-01
    volumes:
      - clickhouse-01-data:/var/lib/clickhouse
      - ./clickhouse/node-config.xml:/etc/clickhouse-server/config.d/cluster-config.xml:ro
      # M5-1-T09 (GAP-046): mTLS overlay — adds https_port 8443 + tcp_port_secure
      # 9440 with openSSL caConfig = client cert verification.
      - ./clickhouse/tls-config.xml:/etc/clickhouse-server/config.d/tls-config.xml:ro
      - ./clickhouse/tls:/etc/clickhouse-server/tls:ro
      - ./clickhouse/init-replicated.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8125:8123"   # HTTP API plain (HA node-01, offset from single-node :8123)
      - "8126:8443"   # HTTPS API mTLS (M5-1-T09) — host offset
      - "9002:9000"   # Native protocol (offset)
      - "9442:9440"   # Native protocol mTLS (M5-1-T09) — host offset
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
      clickhouse-keeper-02:
        condition: service_healthy
      clickhouse-keeper-03:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok. || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
        reservations:
          memory: 512m
    networks:
      - uip-network

  # ─── ClickHouse Node 2 (replica) ──────────────────────────────────────────
  clickhouse-02:
    image: clickhouse/clickhouse-server:23.8
    container_name: uip-clickhouse-02
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_REPLICA_NAME: replica-02
    volumes:
      - clickhouse-02-data:/var/lib/clickhouse
      - ./clickhouse/node-config.xml:/etc/clickhouse-server/config.d/cluster-config.xml:ro
      # M5-1-T09 (GAP-046): mTLS overlay — same as clickhouse-01.
      - ./clickhouse/tls-config.xml:/etc/clickhouse-server/config.d/tls-config.xml:ro
      - ./clickhouse/tls:/etc/clickhouse-server/tls:ro
      - ./clickhouse/init-replicated.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8124:8123"   # HTTP API plain (offset port)
      - "8127:8443"   # HTTPS API mTLS (M5-1-T09) — host offset
      - "9003:9000"   # Native protocol (offset port)
      - "9443:9440"   # Native protocol mTLS (M5-1-T09) — host offset
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
      clickhouse-keeper-02:
        condition: service_healthy
      clickhouse-keeper-03:
        condition: service_healthy
      clickhouse-01:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok. || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
        reservations:
          memory: 512m
    networks:
      - uip-network

  # ─── Override: analytics-service → HA cluster ─────────────────────────────
  # M5-2 decision: JDBC consumers stay on 8123 INTERNAL (uip-network only, NOT
  # published to host). mTLS transport (8443, verified PASS — cert handshake +
  # no-cert reject) is published to host for external/admin access. Reason: the
  # ClickHouse JDBC driver + CH 23.8 HTTPS interface auth is incompatible — JDBC
  # fails 516 over 8443 while curl with the same credential PASSes. 8123 is
  # internal-cluster-only so the data path is not externally exposed; mTLS 8443
  # remains the secure external entry. Follow-up: re-evaluate when upgrading
  # ClickHouse JDBC driver or CH version (tech-debt M5-3+).
  analytics-service:
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse-01:8123,clickhouse-02:8123/${CLICKHOUSE_DB:-analytics}
    depends_on:
      clickhouse-01:
        condition: service_healthy
      clickhouse-02:
        condition: service_healthy

  # ─── Override: backend → HA cluster (8123 internal) ───────────────────────
  backend:
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse-01:8123,clickhouse-02:8123/${CLICKHOUSE_DB:-analytics}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,kafka-2:9092,kafka-3:9092

  # ─── Override: Flink submitters → HA cluster ─────────────────────────────
  flink-esg-job-submitter:
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse-01:8123,clickhouse-02:8123/${CLICKHOUSE_DB:-analytics}
      KAFKA_BOOTSTRAP: kafka:9092,kafka-2:9092,kafka-3:9092

  flink-structural-job-submitter:
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse-01:8123,clickhouse-02:8123/${CLICKHOUSE_DB:-analytics}
      KAFKA_BOOTSTRAP: kafka:9092,kafka-2:9092,kafka-3:9092

  # ═══════════════════════════════════════════════════════════════════════════
  # Kafka 3-broker KRaft Quorum — ADR-037 (S8-OPS02)
  # ═══════════════════════════════════════════════════════════════════════════
  # Overrides kafka service from docker-compose.yml with 3-node quorum config.
  # Adds kafka-2, kafka-3 as additional brokers.
  # replication.factor=3, min.insync.replicas=2 for all topics.
  # ═══════════════════════════════════════════════════════════════════════════

  kafka:
    environment:
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.75'
        reservations:
          memory: 256m

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka-2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.75'
        reservations:
          memory: 256m
    networks:
      - uip-network

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka-3
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.75'
        reservations:
          memory: 256m
    networks:
      - uip-network

  # ─── Override: kafka-init uses RF=3 in HA cluster ─────────────────────────
  kafka-init:
    environment:
      KAFKA_REPLICATION_FACTOR: "3"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════
  # HashiCorp Vault — Secret injection (M5-1-T03, block gate G1)
  # See ADR-048 §6. BSL 1.1 license — NOT AGPL. Acceptable for internal UIP use.
  #
  # Topology:
  #   1. vault       — Vault dev server (single node, in-mem; DR deferred MVP6)
  #   2. vault-init  — one-shot bootstrap: enable KV v2 + pre-load all secrets
  #   3. vault-agent — sidecar: pulls secrets, renders uip.env, caches 5m (R6)
  #
  # Services consume secrets via the shared `vault-secrets` volume:
  #   volumes:
  #     - vault-secrets:/run/secrets:ro
  #   env_file:
  #     - /run/secrets/uip.env
  # (Wiring consumers is opt-in per service to keep the HA overlay diff small;
  #  audit report mvp5-sprint1-vault-secret-audit.md tracks each migration.)
  # ═══════════════════════════════════════════════════════════════════════════

  vault:
    image: hashicorp/vault:1.15
    container_name: uip-vault
    restart: unless-stopped
    # Dev mode: auto-unsealed, in-mem storage, root token = "root".
    # Production MUST switch to file/raft storage + AppRole/JWT auth (ADR-048 §6.2).
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: info
    ports:
      - "8200:8200"   # Vault API (UI: http://localhost:8200, token: root)
    healthcheck:
      # Vault dev server is unsealed by default; "initialized" is the ready signal.
      # Dev server is HTTP-only — must override VAULT_ADDR (CLI defaults to https).
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
    networks:
      - uip-network

  # ─── One-shot: enable KV v2 + pre-load all UIP secrets ──────────────────────
  vault-init:
    image: hashicorp/vault:1.15
    container_name: uip-vault-init
    restart: "no"
    entrypoint: ["/bin/sh", "/vault/init/vault-init.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      # Plaintext values sourced from infrastructure/.env (gitignored).
      # They are written to Vault KV v2 and then MUST be removed from .env in
      # a follow-up task — see audit report mvp5-sprint1-vault-secret-audit.md.
      POSTGRES_USER: ${POSTGRES_USER:-uip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-uip_smartcity}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM36Qg}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-uip-api-secret-dev}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-Operator#2026!}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin#2026!}
      CITIZEN_PASSWORD: ${CITIZEN_PASSWORD:-citizen1_Dev#2026!}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      EMQX_DASHBOARD_USER: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    volumes:
      - ./vault/vault-init.sh:/vault/init/vault-init.sh:ro
      # Dedicated volume for AppRole creds (role_id + secret_id). Kept SEPARATE
      # from vault-secrets so consumer services mounting vault-secrets at
      # /run/secrets never see auth creds (least privilege).
      - vault-approle:/vault/approle
    depends_on:
      vault:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - uip-network

  # ─── Sidecar: AppRole auto-auth + render secrets to shared volume ──────────
  vault-agent:
    image: hashicorp/vault:1.15
    container_name: uip-vault-agent
    restart: unless-stopped
    entrypoint: ["vault", "agent", "-config=/vault/config/vault-agent.hcl"]
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./vault/vault-agent.hcl:/vault/config/vault-agent.hcl:ro
      - ./vault/vault-agent-template.tpl:/vault/config/vault-agent-template.tpl:ro
      # vault-secrets: rendered uip.env, mounted read-only into consumers.
      # vault-approle: AppRole role_id/secret_id written by vault-init.
      - vault-secrets:/vault/secrets
      - vault-approle:/vault/approle
      - vault-agent-pid:/vault/pid
    depends_on:
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      # Agent is healthy when the rendered env-file exists and was written
      # within the last renewal window (token ttl 1h; re-render on rotate).
      # 6-min freshness catches a stalled agent quickly.
      test: ["CMD-SHELL", "test -f /vault/secrets/uip.env && find /vault/secrets/uip.env -mmin -6 | grep -q ."]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - uip-network

  # ═══════════════════════════════════════════════════════════════════════════
  # PostgreSQL Streaming Replication — Primary + Hot Standby (S8-OPS04)
  # Manual promotion (no auto-failover) — SA recommendation: false promotion
  # from network noise is worse than brief downtime.
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── Override: primary uses replication config ──────────────────────────────
  timescaledb:
    environment:
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=256MB
      -c hot_standby=on
      -c hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - ./timescaledb/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    # NOTE: create-replication-role.sh is in timescaledb/migrations/ (mounted by base compose as /docker-entrypoint-initdb.d)

  # ─── Standby replica (read-only) ──────────────────────────────────────────
  timescaledb-standby:
    image: timescale/timescaledb:2.13.1-pg15
    container_name: uip-timescaledb-standby
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/standby-entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-uip_smartcity}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
      STANDBY_PRIMARY_HOST: timescaledb
      STANDBY_PRIMARY_PORT: "5432"
    volumes:
      - timescaledb-standby-data:/var/lib/postgresql/data
      - ./timescaledb/standby-entrypoint.sh:/usr/local/bin/standby-entrypoint.sh:ro
    ports:
      - "5433:5432"   # Read-only access on offset port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uip} -d ${POSTGRES_DB:-uip_smartcity}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    networks:
      - uip-network

volumes:
  clickhouse-keeper-data:
    name: uip-clickhouse-keeper-data
  clickhouse-keeper-02-data:
    name: uip-clickhouse-keeper-02-data
  clickhouse-keeper-03-data:
    name: uip-clickhouse-keeper-03-data
  clickhouse-01-data:
    name: uip-clickhouse-01-data
  clickhouse-02-data:
    name: uip-clickhouse-02-data
  kafka-2-data:
    name: uip-kafka-2-data
  kafka-3-data:
    name: uip-kafka-3-data
  timescaledb-standby-data:
    name: uip-timescaledb-standby-data
  # ─── Vault secret-injection (M5-1-T03 + M5-2-D2) ──────────────────────────
  # Rendered env-file shared read-only with consuming services. Named volume
  # (NOT bind mount) per infra constraint. Survives agent restart; rebuilt
  # from Vault KV on agent start.
  vault-secrets:
    name: uip-vault-secrets
  # AppRole role_id + secret_id — written by vault-init, read by vault-agent.
  # Kept SEPARATE from vault-secrets so consumers never see auth creds.
  vault-approle:
    name: uip-vault-approle
  # PID file dir for vault-agent (kept off the secrets volume for atomicity).
  vault-agent-pid:
    name: uip-vault-agent-pid
