services:
  # ─────────────────────────────────────────────────────────────────────────────
  # TimescaleDB (PostgreSQL 15 + TimescaleDB 2.13)
  # ─────────────────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.13.1-pg15
    container_name: uip-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-uip_smartcity}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uip} -d ${POSTGRES_DB:-uip_smartcity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis 7.2
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: uip-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka (KRaft mode — no Zookeeper)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/create-topics.sh:/etc/kafka/create-topics.sh:ro
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - uip-network

  # Kafka topic initialization
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: ["/bin/bash", "/etc/kafka/create-topics.sh"]
    volumes:
      - ./kafka/create-topics.sh:/etc/kafka/create-topics.sh:ro
    networks:
      - uip-network

  # Kafka UI (Redpanda Console)
  kafka-ui:
    image: redpandadata/console:v2.3.8
    container_name: uip-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # EMQX CE 5.x (MQTT broker)
  # ─────────────────────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.3.2
    container_name: uip-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE_NAME: ${EMQX_NODE_NAME:-emqx@emqx}
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    volumes:
      - emqx_data:/opt/emqx/data
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # MQTT over WebSocket
      - "18083:18083" # Dashboard
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Redpanda Connect (message transformation & routing)
  # ─────────────────────────────────────────────────────────────────────────────
  redpanda-connect:
    image: redpandadata/connect:4.41.0
    container_name: uip-redpanda-connect
    restart: unless-stopped
    command: run /etc/redpanda-connect/uip-normalize.yaml
    volumes:
      - ./redpanda-connect:/etc/redpanda-connect:ro
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Apache Flink (JobManager + TaskManager)
  # ─────────────────────────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-java17
    container_name: uip-flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      DB_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      DB_USER: ${POSTGRES_USER:-uip}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1g
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink/checkpoints
    volumes:
      - flink_checkpoints:/flink/checkpoints
      - ../flink-jobs/target:/opt/flink/usrlib:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/overview || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - uip-network

  flink-taskmanager:
    image: flink:1.19-java17
    container_name: uip-flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      DB_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      DB_USER: ${POSTGRES_USER:-uip}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2g
        taskmanager.numberOfTaskSlots: 8
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink/checkpoints
    volumes:
      - flink_checkpoints:/flink/checkpoints
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Spring Boot Backend API
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: uip-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-uip}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_SSE_BASE_URL: ${VITE_SSE_BASE_URL:-http://localhost:8080}
    container_name: uip-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uip-network

volumes:
  timescaledb_data:
  redis_data:
  kafka_data:
  emqx_data:
  flink_checkpoints:

networks:
  uip-network:
    driver: bridge
