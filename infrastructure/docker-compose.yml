services:
  # ─────────────────────────────────────────────────────────────────────────────
  # TimescaleDB (PostgreSQL 15 + TimescaleDB 2.13)
  # ─────────────────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.13.1-pg15
    container_name: uip-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-uip_smartcity}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uip} -d ${POSTGRES_DB:-uip_smartcity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # ClickHouse 23.8 (Tier 2 OLAP — phục vụ analytics-service)
  # ─────────────────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: uip-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8123:8123"   # HTTP API
      - "9000:9000"   # Native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok. || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis 7.2
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: uip-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka (KRaft mode — no Zookeeper)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/create-topics.sh:/etc/kafka/create-topics.sh:ro
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - uip-network

  # Kafka topic initialization
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uip-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: ["/bin/bash", "/etc/kafka/create-topics.sh"]
    volumes:
      - ./kafka/create-topics.sh:/etc/kafka/create-topics.sh:ro
    networks:
      - uip-network

  # Kafka UI (Redpanda Console)
  kafka-ui:
    image: redpandadata/console:v2.3.8
    container_name: uip-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # EMQX CE 5.x (MQTT broker)
  # ─────────────────────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.3.2
    container_name: uip-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE_NAME: ${EMQX_NODE_NAME:-emqx@emqx}
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    volumes:
      - emqx_data:/opt/emqx/data
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # MQTT over WebSocket
      - "18083:18083" # Dashboard
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Redpanda Connect (message transformation & routing)
  # ─────────────────────────────────────────────────────────────────────────────
  redpanda-connect:
    image: redpandadata/connect:4.41.0
    container_name: uip-redpanda-connect
    restart: unless-stopped
    command: run /etc/redpanda-connect/uip-normalize.yaml
    volumes:
      - ./redpanda-connect:/etc/redpanda-connect:ro
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO (S3-compatible storage for Flink checkpoints + savepoints)
  # Bucket: uip-flink-checkpoints (auto-created via init script)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: uip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"   # S3 API (host 9010 → container 9000, tránh conflict với ClickHouse native 9000)
      - "9001:9001"   # MinIO Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - uip-network

  # MinIO bucket init — creates uip-flink-checkpoints bucket
  minio-init:
    image: minio/mc:latest
    container_name: uip-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/uip-flink-checkpoints &&
      echo 'Bucket uip-flink-checkpoints ready'
      "
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Apache Flink (JobManager + TaskManager)
  # Checkpoints stored in MinIO (S3) — survives container restarts (C-3a fix)
  # ─────────────────────────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-java17
    container_name: uip-flink-jobmanager
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c", "mkdir -p /opt/flink/plugins/s3-fs-hadoop && cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /opt/flink/plugins/s3-fs-hadoop/ && /docker-entrypoint.sh jobmanager"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      DB_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      DB_USER: ${POSTGRES_USER:-uip}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      # S3/MinIO config for checkpoint storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1g
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: s3://uip-flink-checkpoints/checkpoints
        state.savepoints.dir: s3://uip-flink-checkpoints/savepoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin}
        s3.path.style.access: true
    volumes:
      - ../flink-jobs/target:/opt/flink/usrlib:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/overview || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - uip-network

  flink-taskmanager:
    image: flink:1.19-java17
    container_name: uip-flink-taskmanager
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c", "mkdir -p /opt/flink/plugins/s3-fs-hadoop && cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /opt/flink/plugins/s3-fs-hadoop/ && /docker-entrypoint.sh taskmanager"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      DB_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      DB_USER: ${POSTGRES_USER:-uip}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      # S3/MinIO config for checkpoint storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2g
        taskmanager.numberOfTaskSlots: 8
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: s3://uip-flink-checkpoints/checkpoints
        state.savepoints.dir: s3://uip-flink-checkpoints/savepoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin}
        s3.path.style.access: true
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Flink EsgDualSinkJob submitter — runs once after JM+TM are healthy (ADR-026)
  # Submits the dual-sink job: Kafka ngsi_ld_esg → TimescaleDB + ClickHouse
  # ─────────────────────────────────────────────────────────────────────────────
  flink-esg-job-submitter:
    image: flink:1.19-java17
    container_name: uip-flink-esg-job-submitter
    restart: "no"
    command: >
      /bin/bash -c "
        echo 'Checking for existing EsgDualSinkJob...';
        EXISTING=$$(curl -sf http://flink-jobmanager:8081/jobs/overview | grep -o '\"name\":\"EsgDualSinkJob\".*\"state\":\"RUNNING\"' || true);
        if [ -n \"$$EXISTING\" ]; then
          echo 'EsgDualSinkJob already RUNNING — skipping submission.';
        else
          echo 'No running EsgDualSinkJob found — submitting...';
          flink run --detached -m flink-jobmanager:8081 -c com.uip.flink.esg.EsgDualSinkJob /opt/flink/usrlib/uip-flink-jobs-0.1.0-SNAPSHOT.jar;
        fi
      "
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      DB_USER: ${POSTGRES_USER:-uip}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ../flink-jobs/target:/opt/flink/usrlib:ro
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Spring Boot Backend API
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: uip-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-uip_smartcity}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-uip}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      UIP_ANALYTICS_SERVICE_URL: http://analytics-service:8081/api/v1/analytics
    ports:
      - "8080:8080"
      - "8086:8081"  # management/actuator port (container 8081 → host 8086; host 8081 used by Flink)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Analytics Service (Tier 2 — ClickHouse OLAP queries)
  # Host port 8082 → container 8081 (8081 đã bị Flink chiếm trên host)
  # ─────────────────────────────────────────────────────────────────────────────
  analytics-service:
    build:
      context: ../applications/analytics-service
      dockerfile: Dockerfile
    container_name: uip-analytics-service
    restart: unless-stopped
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_SSE_BASE_URL: ${VITE_SSE_BASE_URL:-http://localhost:8080}
    container_name: uip-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Kong API Gateway (DB-less, non-prod — Sprint MVP3-1)
  # Proxy port 8000, Admin API 8001
  # Config: ../infra/kong/kong.local.yml (HS512 local dev)
  # Đổi sang kong.poc.yml khi test RS256 + Keycloak
  # Note: envsubst inject KONG_JWT_SECRET vào config trước khi Kong start
  # ─────────────────────────────────────────────────────────────────────────────
  kong:
    image: kong:3.6
    container_name: uip-kong
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/kong/entrypoint.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ../infra/kong/kong.local.yml:/etc/kong/kong.tpl:ro
      - ../infra/kong/docker-entrypoint-local.sh:/etc/kong/entrypoint.sh:ro
    ports:
      - "8000:8000"   # Kong proxy
      - "8001:8001"   # Kong admin API
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      analytics-service:
        condition: service_healthy
    networks:
      - uip-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Keycloak 23.0 (non-prod, dev mode — Sprint MVP3-1)
  # Admin UI: http://localhost:8085 (admin / ${KEYCLOAK_ADMIN_PASSWORD})
  # Token grant: POST http://localhost:8085/realms/uip/protocol/openid-connect/token
  #   -d "client_id=uip-api&client_secret=uip-api-secret-dev&grant_type=password
  #       &username=operator-hcm&password=Operator#2026!"
  # ─────────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: uip-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=8085
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_Dev#2026!}
      KC_HTTP_PORT: 8085
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: WARN
      KC_HEAP: 512m
      KC_HEALTH_ENABLED: "true"
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: "true"
    volumes:
      - ../infra/keycloak/realm-uip-export.json:/opt/keycloak/data/import/realm-uip-export.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8085:8085"   # Keycloak HTTP
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8085 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
    networks:
      - uip-network

volumes:
  timescaledb_data:
  redis_data:
  kafka_data:
  emqx_data:
  minio_data:
  clickhouse_data:
  keycloak_data:

networks:
  uip-network:
    driver: bridge
