# PostgreSQL Host-Based Authentication — HA mode (docker-compose.ha.yml)
# Extends the default config to allow streaming replication from Docker network.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5
# Allow replication from any container in the Docker bridge network
host    replication     replicator      172.16.0.0/12           md5
host    replication     replicator      192.168.0.0/16          md5
# Allow app connections from Docker network
host    all             all             172.16.0.0/12           md5
host    all             all             192.168.0.0/16          md5
