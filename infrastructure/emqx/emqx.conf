## UIP Smart City — EMQX CE 5.x Configuration
## Enables MQTT listener + Kafka bridge (data bridge plugin)

node {
  name = "emqx@emqx"
  cookie = "uip_emqx_cookie_changeme"
  data_dir = "/opt/emqx/data"
}

log {
  console {
    enable = true
    level = info
  }
  file {
    enable = true
    path = "/opt/emqx/log/emqx.log"
    level = warning
  }
}

# MQTT listeners
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 50000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 10000
}

# Dashboard
dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "changeme"
}

# ─────────────────────────────────────────────────────────────────────────────
# Kafka Data Bridge
# Routes MQTT telemetry → Kafka topic raw_telemetry
# ─────────────────────────────────────────────────────────────────────────────
bridges.kafka.uip_raw_telemetry {
  enable = true
  bootstrap_hosts = "kafka:9092"
  connect_timeout = "5s"

  producer {
    topic = "raw_telemetry"
    # Partition by client_id for locality (same device → same partition)
    partition_strategy = key_dispatch

    # Message template — include MQTT metadata alongside payload
    message {
      key = "${clientid}"
      value = "${payload}"
      timestamp = "${timestamp}"
    }

    # Exactly-once via idempotent producer
    required_acks = all_isr
    compression = no_compression
    max_batch_bytes = 901120  # 880 KB

    buffer {
      memory_overload_protection = true
      per_partition_limit = "2GB"
      mode = hybrid
    }
  }
}

# Rule Engine: route v1/devices/me/telemetry → Kafka bridge
rule_engine {
  rules.uip_telemetry_to_kafka {
    enable = true
    sql = """
      SELECT *, clientid, topic, timestamp
      FROM "v1/devices/me/telemetry"
    """
    actions = ["bridges:kafka:uip_raw_telemetry"]
    description = "Forward device telemetry to Kafka raw_telemetry topic"
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Authentication (allow anonymous for dev; use TLS + auth in prod)
# ─────────────────────────────────────────────────────────────────────────────
authorization {
  no_match = allow
  deny_action = ignore
  cache {
    enable = true
    max_size = 32
    ttl = "1m"
  }
}
