## UIP Smart City — EMQX CE 5.x Configuration
## MQTT broker for IoT sensor data and BMS command routing
## NOTE: Kafka data bridge requires EMQX Enterprise.
##       For CE, Kafka integration is handled by Redpanda Connect
##       subscribing to MQTT topics and forwarding to Kafka.

node {
  name = "emqx@emqx"
  ## Set EMQX_NODE_COOKIE env var in production (docker-compose or Kubernetes secret)
  cookie = "${EMQX_NODE_COOKIE}"
  data_dir = "/opt/emqx/data"
}

log {
  console {
    enable = true
    level = info
  }
  file {
    enable = true
    path = "/opt/emqx/log/emqx.log"
    level = warning
  }
}

# MQTT listeners
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 50000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 10000
}

# Dashboard
dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  ## Set EMQX_DASHBOARD_PASSWORD env var in production (docker-compose or Kubernetes secret)
  default_password = "${EMQX_DASHBOARD_PASSWORD}"
}

# ─────────────────────────────────────────────────────────────────────────────
# Authentication — built-in password auth for tenant MQTT clients
# S6-C01: Production MQTT auth per tenant
# ─────────────────────────────────────────────────────────────────────────────
authentication {
  mechanism = "password_based"
  backend = "built_in_database"
  user_id_type = "username"
}

authorization {
  no_match = deny
  deny_action = disconnect
  cache {
    enable = true
    max_size = 32
    ttl = "1m"
  }
  sources = [
    {
      type = built_in_database
      enable = true
    }
  ]
}

# ─────────────────────────────────────────────────────────────────────────────
# MQTT ACL — Per-tenant topic isolation
# Each MQTT client username must match pattern: {tenantId}/{deviceId}
# Clients may only pub/sub to topics prefixed with their own tenantId.
# SA-C06 fix: deny cross-tenant publish/subscribe
# ─────────────────────────────────────────────────────────────────────────────
# ACL rules are provisioned via EMQX built_in_database HTTP API at startup.
# Equivalent rules (enforced at runtime via authorization source above):
#
#   ALLOW {username} PUB  bms/commands/{tenantId}/{deviceId}
#   ALLOW {username} SUB  bms/commands/{tenantId}/{deviceId}/ack
#   ALLOW {username} PUB  bms/heartbeat/{deviceId}
#   ALLOW {username} PUB  sensors/{tenantId}/+
#   DENY  all        ALL  bms/commands/{otherTenant}/#   (implicit — no_match=deny)
#
# Provision script: scripts/emqx-provision-acl.sh

# ─────────────────────────────────────────────────────────────────────────────
# Rule Engine (CE built-in actions only)
# OPS-2: Log BMS command dispatch and ACK events to EMQX console for monitoring
# S6-C01: Device heartbeat monitoring → status ONLINE/UNKNOWN
# Note: Kafka forwarding done by Redpanda Connect (MQTT source → Kafka sink)
# ─────────────────────────────────────────────────────────────────────────────
rule_engine {
  rules.uip_bms_command_dispatch {
    enable = true
    sql = """
      SELECT *, clientid, topic, timestamp
      FROM "bms/commands/+/+"
    """
    actions = [
      {
        function = "console"
      }
    ]
    description = "OPS-2: Log BMS command dispatch (bms/commands/{tenantId}/{deviceId})"
  }

  rules.uip_bms_command_ack {
    enable = true
    sql = """
      SELECT *, clientid, topic, timestamp
      FROM "bms/commands/+/+/ack"
    """
    actions = [
      {
        function = "console"
      }
    ]
    description = "OPS-2: Log BMS command ACK responses"
  }

  rules.uip_device_heartbeat {
    enable = true
    sql = """
      SELECT
        clientid as device_id,
        payload as status_payload,
        timestamp
      FROM "bms/heartbeat/+"
    """
    actions = [
      {
        function = "console"
      }
    ]
    description = "S6-C01: Device heartbeat monitoring (bms/heartbeat/{deviceId})"
  }
}

