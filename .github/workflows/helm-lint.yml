name: Helm Lint

# MVP5 Sprint M5-2 Task T14 — Helm chart quality gate (ADR-050 K8s readiness).
# Runs `helm lint` on all charts in infra/helm/*/ to catch:
#   - YAML syntax errors (values.yaml, templates/*.yaml)
#   - Missing required fields (Chart.yaml: apiVersion, name, version)
#   - Template rendering errors (invalid Go template syntax)
#   - Kubernetes schema violations (Deployment/Service/HPA structure)
#
# This CI fails the PR before merge if any chart has lint errors (exit code != 0).
# Warnings are shown but do not block merge (aligns with M5-2 acceptance criteria).

on:
  push:
    branches: [main, develop, "release/*"]
    paths:
      - "infra/helm/**"
      - ".github/workflows/helm-lint.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/helm/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  helm-lint:
    name: Helm Lint All Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint uip-backend chart
        run: |
          helm lint infra/helm/uip-backend/ \
            --strict \
            --values infra/helm/uip-backend/values.yaml

      - name: Lint uip-analytics-service chart
        run: |
          helm lint infra/helm/uip-analytics-service/ \
            --strict \
            --values infra/helm/uip-analytics-service/values.yaml

      - name: Validate template rendering (uip-backend)
        run: |
          helm template uip-backend infra/helm/uip-backend/ \
            --values infra/helm/uip-backend/values.yaml \
            --namespace uip-dev \
            --dry-run > /dev/null

      - name: Validate template rendering (uip-analytics-service)
        run: |
          helm template uip-analytics-service infra/helm/uip-analytics-service/ \
            --values infra/helm/uip-analytics-service/values.yaml \
            --namespace uip-dev \
            --dry-run > /dev/null

      - name: Summary
        if: success()
        run: |
          echo "✅ All Helm charts passed lint validation"
          echo ""
          echo "Charts validated:"
          echo "  - infra/helm/uip-backend/"
          echo "  - infra/helm/uip-analytics-service/"
