name: OpenAPI Snapshot (Weekly)

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 02:00 UTC
  workflow_dispatch:

jobs:
  snapshot:
    name: Generate OpenAPI Snapshot
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: uip_smartcity
          POSTGRES_USER: uip
          POSTGRES_PASSWORD: uip_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uip -d uip_smartcity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uip_smartcity
      SPRING_DATASOURCE_USERNAME: uip
      SPRING_DATASOURCE_PASSWORD: uip_test_pass
      SPRING_PROFILES_ACTIVE: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Start backend
        working-directory: backend
        run: |
          ./gradlew bootRun &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
      - name: Fetch OpenAPI spec
        run: |
          curl -sf http://localhost:8080/v3/api-docs -o docs/api/openapi.json
      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: update OpenAPI snapshot'
          body: 'Weekly OpenAPI spec snapshot auto-generated.'
          branch: openapi-snapshot-update
          commit-message: 'chore: update OpenAPI snapshot'
