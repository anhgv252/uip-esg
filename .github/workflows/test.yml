name: CI Tests

on:
  push:
    branches: [ main, develop, 'sprint/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: uip_smartcity
          POSTGRES_USER: uip
          POSTGRES_PASSWORD: uip_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uip -d uip_smartcity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uip_smartcity
      SPRING_DATASOURCE_USERNAME: uip
      SPRING_DATASOURCE_PASSWORD: uip_test_pass
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:29092
      SPRING_PROFILES_ACTIVE: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  flink-tests:
    name: Flink Jobs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven
      - name: Run Flink unit tests
        working-directory: flink-jobs
        run: mvn -q test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flink-test-results
          path: flink-jobs/target/surefire-reports/

  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run
      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check
      - name: Check API contract drift
        working-directory: frontend
        run: |
          npm run generate:types
          git diff --exit-code src/generated/api-types.ts || \
            (echo "::error::API contract drift: run 'npm run generate:types' and commit src/generated/api-types.ts" && exit 1)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/

  openapi-contract:
    name: OpenAPI Contract (Breaking Change Gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get baseline spec from main branch
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/openapi.json > /tmp/baseline-openapi.json 2>/dev/null || \
            echo '{"openapi":"3.0.1","info":{"title":"baseline","version":"0"},"paths":{}}' > /tmp/baseline-openapi.json

      - name: Download openapi-diff CLI
        run: |
          curl -sL \
            https://github.com/OpenAPITools/openapi-diff/releases/download/openapi-diff-2.1.0/openapi-diff-2.1.0.jar \
            -o /tmp/openapi-diff.jar

      - name: Run openapi-diff (breaking change detection)
        id: openapi_diff
        run: |
          java -jar /tmp/openapi-diff.jar \
            /tmp/baseline-openapi.json \
            docs/api/openapi.json \
            --fail-on-incompatible \
            --markdown /tmp/openapi-diff-report.md 2>&1 || {
              echo "BREAKING_CHANGES=true" >> "$GITHUB_ENV"
              echo "::error title=Breaking API Changes::This PR introduces breaking API changes. See openapi-diff report artifact."
              echo "## Breaking API Changes Detected" >> "$GITHUB_STEP_SUMMARY"
              cat /tmp/openapi-diff-report.md >> "$GITHUB_STEP_SUMMARY" || true
              exit 1
            }
          echo "## OpenAPI Diff — No Breaking Changes" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/openapi-diff-report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-diff-report
          path: /tmp/openapi-diff-report.md
          retention-days: 7

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend for preview
        working-directory: frontend
        run: npm run build
      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e
        env:
          BASE_URL: http://localhost:3000
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
