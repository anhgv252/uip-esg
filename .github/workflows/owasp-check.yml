name: OWASP Dependency Check

on:
  schedule:
    # Weekly Monday 2AM UTC (9AM ICT)
    - cron: '0 2 * * 1'
  push:
    paths:
      - 'backend/build.gradle'
      - 'backend/gradle.properties'
      - 'backend/config/dependency-check-suppressions.xml'
  pull_request:
    paths:
      - 'backend/build.gradle'
      - 'backend/gradle.properties'
  workflow_dispatch:

jobs:
  owasp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache NVD data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-
      
      - name: Run OWASP Dependency Check
        working-directory: backend
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon --info
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: |
            backend/build/reports/dependency-check/
          retention-days: 30
      
      - name: Parse Vulnerabilities
        id: parse-vulns
        if: always()
        run: |
          # Parse JSON report for CRITICAL/HIGH vulnerabilities
          REPORT_FILE="backend/build/reports/dependency-check/dependency-check-report.json"
          
          if [ ! -f "$REPORT_FILE" ]; then
            echo "ERROR: Report file not found at $REPORT_FILE"
            exit 1
          fi
          
          # Count vulnerabilities by severity
          CRITICAL=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseSeverity == "CRITICAL" or .cvssv2?.severity == "HIGH" and (.cvssv3?.baseScore // 0) >= 9.0)] | length' "$REPORT_FILE")
          HIGH=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseSeverity == "HIGH" or (.cvssv3?.baseScore // 0) >= 7.0 and (.cvssv3?.baseScore // 0) < 9.0)] | length' "$REPORT_FILE")
          MEDIUM=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseSeverity == "MEDIUM")] | length' "$REPORT_FILE")
          
          echo "CRITICAL=$CRITICAL" >> $GITHUB_OUTPUT
          echo "HIGH=$HIGH" >> $GITHUB_OUTPUT
          echo "MEDIUM=$MEDIUM" >> $GITHUB_OUTPUT
          
          # Extract vulnerable dependencies for summary
          jq -r '.dependencies[]? | select(.vulnerabilities[]?) | 
            "- \(.fileName): \([.vulnerabilities[]?.name] | join(", "))"' \
            "$REPORT_FILE" > vulns.txt || echo "(none)" > vulns.txt
      
      - name: Check Vulnerability Threshold
        if: always()
        run: |
          CRITICAL=${{ steps.parse-vulns.outputs.CRITICAL }}
          HIGH=${{ steps.parse-vulns.outputs.HIGH }}
          
          echo "=== OWASP Dependency-Check Results ==="
          echo "CRITICAL vulnerabilities: $CRITICAL"
          echo "HIGH vulnerabilities: $HIGH"
          echo "MEDIUM vulnerabilities: ${{ steps.parse-vulns.outputs.MEDIUM }}"
          echo ""
          echo "Threshold: 0 CRITICAL/HIGH (CVSS >= 7.0)"
          echo ""
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ FAIL: Found $(($CRITICAL + $HIGH)) CRITICAL/HIGH vulnerabilities"
            echo ""
            echo "Vulnerable dependencies:"
            cat vulns.txt
            echo ""
            echo "Action required:"
            echo "  1. Review report artifact"
            echo "  2. Upgrade affected dependencies in build.gradle"
            echo "  3. If false positive: add suppression to config/dependency-check-suppressions.xml"
            exit 1
          else
            echo "✅ PASS: No CRITICAL/HIGH vulnerabilities found"
          fi
      
      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.parse-vulns.outputs.CRITICAL }}';
            const high = '${{ steps.parse-vulns.outputs.HIGH }}';
            const medium = '${{ steps.parse-vulns.outputs.MEDIUM }}';
            
            const status = (critical === '0' && high === '0') ? '✅ PASS' : '❌ FAIL';
            const body = `## OWASP Dependency Check ${status}
            
            **Vulnerability Summary:**
            - 🔴 CRITICAL: ${critical}
            - 🟠 HIGH: ${high}
            - 🟡 MEDIUM: ${medium}
            
            **Threshold:** 0 CRITICAL/HIGH (CVSS ≥ 7.0)
            
            ${status === '❌ FAIL' ? '⚠️ Action required: Review dependencies or add suppressions.' : ''}
            
            📊 [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
