name: Mobile Simulator CI

# Trigger on changes to mobile app, hooks, or api-types
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'applications/operator-mobile/**'
      - 'packages/hooks/**'
      - 'packages/api-types/**'
      - '.github/workflows/mobile-sim.yml'
  pull_request:
    paths:
      - 'applications/operator-mobile/**'
      - 'packages/hooks/**'
      - 'packages/api-types/**'
      - '.github/workflows/mobile-sim.yml'

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: TypeScript Type Check
  # ─────────────────────────────────────────────────────────────────────────────
  mobile-type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/operator-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applications/operator-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Expo Web Export (Android emulator fallback)
  # ─────────────────────────────────────────────────────────────────────────────
  # Why web export instead of Android emulator?
  # - GitHub ubuntu-latest runners do NOT support KVM (kernel module for Android emulator)
  # - macOS runners ($$$) support emulators but cost 10x ubuntu runners
  # - Expo Go on emulator requires manual APK download + authentication
  # - Web export validates that the React Native app compiles and renders
  #
  # Limitation: Does not test native modules (expo-secure-store, etc.)
  # Future: Consider self-hosted runner with KVM or paid macOS runner for full Android sim
  mobile-android-sim:
    name: Expo Web Export (Android fallback)
    runs-on: ubuntu-latest
    needs: mobile-type-check
    defaults:
      run:
        working-directory: applications/operator-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applications/operator-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export Expo app for web
        run: npx expo export --platform web --output-dir dist-web

      - name: Verify app renders (check for JS bundle)
        run: |
          if [ ! -f dist-web/_expo/static/js/web/index-*.js ]; then
            echo "❌ Web bundle not found — app failed to render"
            exit 1
          fi
          echo "✅ Web bundle generated successfully"

      - name: Upload web bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-bundle-${{ github.sha }}
          path: applications/operator-mobile/dist-web
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary: Report status
  # ─────────────────────────────────────────────────────────────────────────────
  mobile-sim-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [mobile-type-check, mobile-android-sim]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.mobile-type-check.result }}" != "success" ]; then
            echo "❌ TypeScript type check failed"
            exit 1
          fi
          if [ "${{ needs.mobile-android-sim.result }}" != "success" ]; then
            echo "❌ Expo web export failed"
            exit 1
          fi
          echo "✅ All mobile CI jobs passed"
